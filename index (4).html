<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Что делать на каникулах? — Вдохновляющие идеи</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Neucha&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fef9ef;
            --card-bg: #ffffff;
            --text: #2d3436;
            --accent: #ff7675;
            --accent2: #fdcb6e;
            --primary: #0984e3;
            --season-summer: #ffeaa7;
            --season-winter: #dfe6e9;
            --season-spring: #fd79a8;
            --season-autumn: #e17055;
            --font-heading: 'Neucha', cursive;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.6s, color 0.6s;
            cursor: none;
            background-image: radial-gradient(circle at 30% 30%, rgba(255, 245, 220, 0.5) 0%, transparent 50%),
                              radial-gradient(circle at 70% 70%, rgba(220, 240, 255, 0.5) 0%, transparent 50%);
        }

        body.winter {
            --bg: #edf2f7;
            background: linear-gradient(135deg, #dce8f5 0%, #f2f5f9 100%);
        }
        body.spring {
            --bg: #fce4ec;
            background: linear-gradient(135deg, #f8bbd0 0%, #fce4ec 100%);
        }
        body.autumn {
            --bg: #fff3e0;
            background: linear-gradient(135deg, #ffe0b2 0%, #fff3e0 100%);
        }
        body.summer {
            --bg: #fffff5;
            background: linear-gradient(135deg, #fff9c4 0%, #fffff5 100%);
        }

        /* Приятный курсор-звёздочка */
        .cursor-glow {
            position: fixed;
            width: 30px;
            height: 30px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23FFD700"><path d="M12 2l2.4 7.2h7.6l-6 4.8 2.4 7.2-6-4.8-6 4.8 2.4-7.2-6-4.8h7.6z"/></svg>') no-repeat center;
            background-size: contain;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            filter: drop-shadow(0 0 8px gold);
            transition: width 0.2s, height 0.2s;
            will-change: left, top;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            position: relative;
            z-index: 2;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-family: var(--font-heading);
            font-size: clamp(2.5rem, 7vw, 4.5rem);
            font-weight: 800;
            background: linear-gradient(135deg, #ff7675, #fdcb6e, #00b894);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 6px 8px rgba(0,0,0,0.1));
            margin-bottom: 0.3rem;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #636e72;
            letter-spacing: 1px;
            font-weight: 400;
        }

        .timer-box {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(16px);
            border-radius: 30px;
            padding: 1rem 2.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            margin: 2rem 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.04);
            font-weight: 600;
            color: #2d3436;
            font-size: 1rem;
            border: 2px solid rgba(255,255,255,0.6);
        }
        .timer-box span {
            font-family: 'Courier New', monospace;
            font-size: 2rem;
            font-weight: 700;
            color: #d63031;
            background: #fff0f0;
            padding: 0 10px;
            border-radius: 12px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1.2rem;
            margin: 2rem 0;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.8);
        }
        .season-switch {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .season-btn {
            background: rgba(255,255,255,0.9);
            border: none;
            padding: 0.7rem 1.4rem;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: none;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            color: #555;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
        }
        .season-btn.active {
            background: #ffeaa7;
            color: #2d3436;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            transform: scale(1.05);
            border: 1px solid #fdcb6e;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 40px;
            padding: 0.2rem;
            border: 2px solid #f0e5d8;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }
        .search-box input {
            border: none;
            padding: 0.7rem 1.2rem;
            font-size: 0.95rem;
            outline: none;
            border-radius: 40px;
            width: 200px;
            background: transparent;
            color: #2d3436;
            cursor: none;
        }
        .search-box button {
            background: #fdcb6e;
            border: none;
            border-radius: 40px;
            padding: 0.7rem 1.5rem;
            font-weight: 700;
            color: #2d3436;
            cursor: none;
            transition: 0.3s;
            letter-spacing: 0.5px;
        }
        .search-box button:hover {
            background: #f9ca24;
            box-shadow: 0 0 15px #f9ca24;
        }
        .filter-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: rgba(255,255,255,0.9);
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: none;
            transition: 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            color: #555;
        }
        .filter-btn.active {
            background: #a29bfe;
            color: white;
            box-shadow: 0 4px 12px rgba(162, 155, 254, 0.4);
        }
        .fav-badge {
            background: #ff7675;
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 30px;
            font-weight: 700;
            cursor: none;
            box-shadow: 0 4px 12px rgba(255, 118, 117, 0.3);
            letter-spacing: 0.5px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }
        .card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            transition: 0.4s cubic-bezier(0.2,0.9,0.4,1);
            cursor: none;
            position: relative;
        }
        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 45px rgba(0,0,0,0.12);
        }
        .card-image {
            height: 200px;
            background-size: cover;
            background-position: center;
            transition: 0.4s;
        }
        .card:hover .card-image {
            filter: brightness(1.05) saturate(1.1);
        }
        .card-content {
            padding: 1.5rem;
        }
        .card-content h3 {
            font-family: 'Neucha', cursive;
            font-size: 1.7rem;
            color: #2d3436;
            margin-bottom: 0.3rem;
        }
        .category {
            display: inline-block;
            background: #f5f0eb;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #636e72;
            margin-bottom: 0.8rem;
            letter-spacing: 0.5px;
        }
        .card-content p {
            color: #636e72;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 1.2rem;
        }
        .card-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            background: #fdcb6e;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 25px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: none;
            transition: 0.3s;
            color: #2d3436;
        }
        .btn.outline {
            background: transparent;
            border: 2px solid #fdcb6e;
            color: #e17055;
        }
        .btn.outline:hover {
            background: #fff5e6;
        }
        .btn.fav {
            background: none;
            border: none;
            font-size: 1.5rem;
            padding: 0.1rem 0.4rem;
            transition: 0.3s;
            color: #dfe6e9;
        }
        .btn.fav.fav-active {
            color: #e74c3c;
            transform: scale(1.3);
            text-shadow: 0 0 10px rgba(231, 76, 60, 0.4);
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal-card {
            background: white;
            border-radius: 35px;
            max-width: 500px;
            width: 90%;
            padding: 2rem;
            text-align: center;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            transform: scale(0.9);
            transition: 0.3s;
        }
        .active .modal-card {
            transform: scale(1);
        }
        .modal-close {
            position: absolute;
            top: 15px; right: 25px;
            font-size: 2.2rem;
            background: none;
            border: none;
            color: #b2bec3;
            cursor: none;
        }
        .modal-img {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 1rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.7;
            animation: float 10s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }
        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box {
                width: 100%;
            }
            .search-box input {
                width: 100%;
            }
        }
    </style>
</head>
<body class="summer">
    <div class="cursor-glow" id="cursorGlow"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <header class="header">
            <h1>☀️ Что делать на каникулах?</h1>
            <p class="subtitle">Самые тёплые идеи для душевного отдыха</p>
            <div class="timer-box" id="timerBox">
                ⏳ До летних каникул: <span id="timerDays">0</span> дней
            </div>
        </header>

        <div class="controls">
            <div class="season-switch" id="seasonSwitch">
                <button class="season-btn active" data-season="summer">☀️ Лето</button>
                <button class="season-btn" data-season="autumn">🍂 Осень</button>
                <button class="season-btn" data-season="winter">❄️ Зима</button>
                <button class="season-btn" data-season="spring">🌸 Весна</button>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Найти занятие...">
                <button id="searchBtn">🔍</button>
            </div>
            <div class="filter-group" id="filterGroup">
                <button class="filter-btn active" data-filter="all">Всё</button>
                <button class="filter-btn" data-filter="active">Активный</button>
                <button class="filter-btn" data-filter="creative">Творчество</button>
                <button class="filter-btn" data-filter="relax">Релакс</button>
                <button class="filter-btn" data-filter="learn">Познание</button>
            </div>
            <div class="fav-badge" id="favBadge">⭐ Избранное (<span id="favCount">0</span>)</div>
        </div>

        <div class="grid" id="cardGrid"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card">
            <button class="modal-close" id="modalClose">&times;</button>
            <img class="modal-img" id="modalImg" src="" alt="">
            <h2 id="modalTitle" style="font-family:'Neucha'; font-size:2.2rem; color:#2d3436;"></h2>
            <p id="modalCat" style="color:#636e72; font-weight:600; letter-spacing:1px;"></p>
            <p id="modalDesc" style="margin:1.2rem 0; color:#2d3436; line-height:1.7;"></p>
            <p id="modalSeason" style="font-style:italic; color:#b2bec3;"></p>
        </div>
    </div>

    <script>
        (function() {
            const activities = [
                { id:1, name:"Пляжный отдых", season:["summer"], category:"relax", image:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600&h=400&fit=crop", desc:"Почувствуй песок под ногами и солёный бриз. Возьми хорошую книгу и солнцезащитный крем." },
                { id:2, name:"Поход в горы", season:["summer","autumn","spring"], category:"active", image:"https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=600&h=400&fit=crop", desc:"Свежий воздух, панорамные виды и чувство свободы. Идеально для перезагрузки." },
                { id:3, name:"Велосипедная прогулка", season:["summer","spring","autumn"], category:"active", image:"https://images.unsplash.com/photo-1507035895480-2b3156c31fc8?w=600&h=400&fit=crop", desc:"Исследуй окрестности на двух колёсах. Ветер в волосах и новые маршруты." },
                { id:4, name:"Чтение у окна", season:["all"], category:"learn", image:"https://images.unsplash.com/photo-1512820790803-83ca734da794?w=600&h=400&fit=crop", desc:"Уютный плед, горячий чай и захватывающий роман. Лучший способ замедлиться." },
                { id:5, name:"Кулинарные шедевры", season:["all"], category:"creative", image:"https://images.unsplash.com/photo-1466637574441-749b8f19452f?w=600&h=400&fit=crop", desc:"Приготовь что-то новое: пасту, десерт или завтрак-сюрприз для семьи." },
                { id:6, name:"Кино-марафон", season:["all"], category:"relax", image:"https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=600&h=400&fit=crop", desc:"Запасись попкорном и выбери три любимых фильма. Домашний кинотеатр ждёт." },
                { id:7, name:"Рисование акварелью", season:["all"], category:"creative", image:"https://images.unsplash.com/photo-1513364776144-60967b0f800f?w=600&h=400&fit=crop", desc:"Купи скетчбук и краски. Рисуй всё, что вдохновляет: цветы, закаты, портреты." },
                { id:8, name:"Утренняя пробежка", season:["summer","spring","autumn"], category:"active", image:"https://images.unsplash.com/photo-1506784983877-45594efa4cbe?w=600&h=400&fit=crop", desc:"Начни день с пробежки в парке. Энергия и хорошее настроение гарантированы." },
                { id:9, name:"Изучение языка", season:["all"], category:"learn", image:"https://images.unsplash.com/photo-1546410531-bb4caa6b424d?w=600&h=400&fit=crop", desc:"Запишись на курс или скачай приложение. Новые слова открывают мир." },
                { id:10, name:"Пикник с друзьями", season:["summer","spring"], category:"relax", image:"https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=600&h=400&fit=crop", desc:"Расстели плед в парке, приготовь сэндвичи и наслаждайся общением." },
                { id:11, name:"Катание на коньках", season:["winter"], category:"active", image:"https://images.unsplash.com/photo-1571252261448-9e1e2e5b6445?w=600&h=400&fit=crop", desc:"Скользи по льду под музыку. Весело и полезно для осанки." },
                { id:12, name:"Снежные фигуры", season:["winter"], category:"creative", image:"https://images.unsplash.com/photo-1513297887119-d46091b24bfa?w=600&h=400&fit=crop", desc:"Слепи снеговика или целую крепость. Зимняя сказка своими руками." },
                { id:13, name:"Фотоохота", season:["all"], category:"creative", image:"https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=600&h=400&fit=crop", desc:"Лови красивые кадры на телефон или камеру. Устрой выставку своих работ." },
                { id:14, name:"Медитация в парке", season:["all"], category:"relax", image:"https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=600&h=400&fit=crop", desc:"Найди тихое место, закрой глаза и послушай природу. Гармония внутри." },
                { id:15, name:"Посещение музея", season:["all"], category:"learn", image:"https://images.unsplash.com/photo-1518998053901-5348d3961a04?w=600&h=400&fit=crop", desc:"Открой для себя искусство или историю. Многие музеи бесплатны в определённые дни." }
            ];

            let currentSeason = 'summer';
            let currentFilter = 'all';
            let searchTerm = '';
            let favorites = JSON.parse(localStorage.getItem('holidayFavs2')) || [];

            const body = document.body;
            const grid = document.getElementById('cardGrid');
            const favCount = document.getElementById('favCount');
            const modalOverlay = document.getElementById('modalOverlay');

            function saveFavorites() { localStorage.setItem('holidayFavs2', JSON.stringify(favorites)); }
            function isFav(id) { return favorites.includes(id); }
            function toggleFav(id) {
                if (isFav(id)) favorites = favorites.filter(f => f !== id);
                else favorites.push(id);
                saveFavorites();
                render();
            }

            function getFiltered() {
                return activities.filter(a => {
                    if (currentSeason !== 'all' && !a.season.includes('all') && !a.season.includes(currentSeason)) return false;
                    if (currentFilter !== 'all' && a.category !== currentFilter) return false;
                    if (searchTerm) {
                        const s = searchTerm.toLowerCase();
                        return a.name.toLowerCase().includes(s) || a.desc.toLowerCase().includes(s);
                    }
                    return true;
                });
            }

            function render() {
                const items = getFiltered();
                grid.innerHTML = '';
                favCount.textContent = favorites.length;

                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card-image" style="background-image: url('${item.image}')"></div>
                        <div class="card-content">
                            <span class="category">${translateCategory(item.category)}</span>
                            <h3>${item.name}</h3>
                            <p>${item.desc.substring(0, 85)}...</p>
                            <div class="card-actions">
                                <button class="btn outline details-btn">Подробнее</button>
                                <button class="btn fav ${isFav(item.id) ? 'fav-active' : ''}">${isFav(item.id) ? '❤️' : '🤍'}</button>
                            </div>
                        </div>
                    `;
                    card.querySelector('.details-btn').addEventListener('click', (e) => { e.stopPropagation(); openModal(item); });
                    card.querySelector('.fav').addEventListener('click', (e) => { e.stopPropagation(); toggleFav(item.id); });
                    card.addEventListener('click', () => openModal(item));
                    grid.appendChild(card);
                });
            }

            function translateCategory(cat) {
                const map = { active:'Активный отдых', creative:'Творчество', relax:'Расслабление', learn:'Саморазвитие' };
                return map[cat] || cat;
            }

            function openModal(item) {
                document.getElementById('modalImg').src = item.image;
                document.getElementById('modalTitle').textContent = item.name;
                document.getElementById('modalCat').textContent = translateCategory(item.category);
                document.getElementById('modalDesc').textContent = item.desc;
                document.getElementById('modalSeason').textContent = 'Сезон: ' + item.season.map(s => s==='all'?'любой':s).join(', ');
                modalOverlay.classList.add('active');
            }

            document.querySelectorAll('.season-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentSeason = btn.dataset.season;
                    body.className = currentSeason;
                    updateParticles(currentSeason);
                    render();
                });
            });

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    render();
                });
            });

            document.getElementById('searchBtn').addEventListener('click', () => {
                searchTerm = document.getElementById('searchInput').value.trim();
                render();
            });
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') { searchTerm = e.target.value.trim(); render(); }
            });

            document.getElementById('modalClose').addEventListener('click', () => modalOverlay.classList.remove('active'));
            modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) modalOverlay.classList.remove('active'); });

            function updateTimer() {
                const now = new Date();
                const year = now.getFullYear();
                const summerStart = new Date(year, 5, 1);
                if (now > summerStart) summerStart.setFullYear(year + 1);
                const diff = Math.ceil((summerStart - now) / (1000 * 60 * 60 * 24));
                document.getElementById('timerDays').textContent = diff;
            }
            updateTimer();
            setInterval(updateTimer, 1000 * 60 * 60);

            const particlesContainer = document.getElementById('particles');
            function updateParticles(season) {
                particlesContainer.innerHTML = '';
                const colors = {
                    summer: ['#f9ca24','#f0932b','#f6e58d'],
                    winter: ['#dfe6e9','#b2bec3','#81ecec'],
                    autumn: ['#e17055','#fab1a0','#fdcb6e'],
                    spring: ['#fd79a8','#e84393','#a29bfe']
                };
                const palette = colors[season] || colors.summer;
                for (let i=0; i<35; i++) {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.style.left = Math.random()*100+'%';
                    p.style.animationDelay = Math.random()*10+'s';
                    p.style.width = p.style.height = (4 + Math.random()*10)+'px';
                    p.style.background = palette[Math.floor(Math.random()*palette.length)];
                    particlesContainer.appendChild(p);
                }
            }
            updateParticles('summer');

            const cursor = document.getElementById('cursorGlow');
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });

            render();
        })();
    </script>
</body>
</html>
